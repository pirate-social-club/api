name: secret-scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      trufflehog_results:
        description: "TruffleHog result classes to fail on"
        required: true
        default: "verified"
        type: choice
        options:
          - verified
          - verified,unknown
  schedule:
    - cron: "17 8 * * 1"

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks-snapshot:
    name: Gitleaks snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Scan current tree
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.0 \
            detect \
            --no-git \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --redact \
            --verbose

  gitleaks-history:
    name: Gitleaks history
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Scan Git history
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.0 \
            detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --redact \
            --verbose

  trufflehog-history:
    name: TruffleHog history
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Scan Git history
        env:
          TRUFFLEHOG_RESULTS: ${{ github.event_name == 'workflow_dispatch' && inputs.trufflehog_results || 'verified' }}
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/trufflesecurity/trufflehog:3.92.4 \
            git file:///repo \
            --results="$TRUFFLEHOG_RESULTS" \
            --no-update \
            --fail
