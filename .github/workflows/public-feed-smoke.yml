name: public-feed-smoke

on:
  workflow_dispatch:
    inputs:
      origin:
        description: "API origin to probe"
        required: false
        default: "https://api.pirate.sc"
      web_origin:
        description: "Origin header to send"
        required: false
        default: "https://pirate.sc"
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

jobs:
  public-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        probe:
          - name: best
            sort: best
            time_range: ""
          - name: new
            sort: new
            time_range: ""
          - name: top-all
            sort: top
            time_range: all

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Probe public home feed
        env:
          ORIGIN: ${{ github.event.inputs.origin || 'https://api.pirate.sc' }}
          WEB_ORIGIN: ${{ github.event.inputs.web_origin || 'https://pirate.sc' }}
          SORT: ${{ matrix.probe.sort }}
          TIME_RANGE: ${{ matrix.probe.time_range }}
        run: |
          args=(
            --origin "$ORIGIN"
            --web-origin "$WEB_ORIGIN"
            --sort "$SORT"
            --locale en
            --max-hit-ms 2500
          )
          if [ -n "$TIME_RANGE" ]; then
            args+=(--time-range "$TIME_RANGE")
          fi
          bun services/api/scripts/smoke-public-feed-cache.ts "${args[@]}"
