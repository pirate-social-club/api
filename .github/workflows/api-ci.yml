name: api-ci

on:
  pull_request:
    paths:
      - ".github/workflows/api-ci.yml"
      - "services/api/**"
      - "services/cli/**"
      - "services/community-protocol-issuer/**"
      - "services/community-protocol-prover-runpod/**"
      - "services/community-provision-operator/**"
      - "services/contracts/**"
      - "services/shared/**"
  push:
    paths:
      - ".github/workflows/api-ci.yml"
      - "services/api/**"
      - "services/cli/**"
      - "services/community-protocol-issuer/**"
      - "services/community-protocol-prover-runpod/**"
      - "services/community-provision-operator/**"
      - "services/contracts/**"
      - "services/shared/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Link shared database fixtures
        run: |
          ln -sfn "$GITHUB_WORKSPACE/services/api/test-fixtures/db" "$GITHUB_WORKSPACE/../db"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Run repo hygiene checks
        run: node scripts/check-repo-hygiene.mjs

      - name: Install shared dependencies
        working-directory: services/shared
        run: bun install --frozen-lockfile

      - name: Typecheck shared package
        working-directory: services/shared
        run: bun run check

      - name: Install contracts dependencies
        working-directory: services/contracts
        run: bun install --frozen-lockfile

      - name: Check generated contracts freshness when specs are available
        working-directory: services/contracts
        run: |
          if [ -f ../../../specs/api/scripts/generate-api-contracts.ts ]; then
            bun run check:fresh
          else
            echo "Skipping contracts freshness check; sibling specs checkout not available."
          fi

      - name: Typecheck generated contracts package
        working-directory: services/contracts
        run: bun run check

      - name: Check out core migration source
        uses: actions/checkout@v4
        with:
          repository: pirate-social-club/core
          path: core

      - name: Install community provision operator dependencies
        working-directory: services/community-provision-operator
        run: bun install --frozen-lockfile

      - name: Check generated community migration manifest freshness
        working-directory: services/community-provision-operator
        env:
          PIRATE_CORE_REPO: ${{ github.workspace }}/core
        run: |
          bun run generate:migrations
          git diff --exit-code -- src/generated/community-migrations.ts

      - name: Typecheck community provision operator
        working-directory: services/community-provision-operator
        run: bun run check

      - name: Run community provision operator tests
        working-directory: services/community-provision-operator
        run: bun run test

      - name: Install API dependencies
        working-directory: services/api
        run: bun install --frozen-lockfile

      - name: Typecheck API service
        working-directory: services/api
        run: bun run check

      - name: Lint API service
        working-directory: services/api
        run: bun run lint

      - name: Run API tests
        working-directory: services/api
        run: bun run test

      - name: Run API coverage report
        working-directory: services/api
        run: bun run coverage

  cli:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install contracts dependencies
        working-directory: services/contracts
        run: bun install --frozen-lockfile

      - name: Install CLI dependencies
        working-directory: services/cli
        run: bun install --frozen-lockfile

      - name: Typecheck CLI
        working-directory: services/cli
        run: bun run check

      - name: Run CLI tests
        working-directory: services/cli
        run: bun run test

  community-protocol-issuer:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install issuer dependencies
        working-directory: services/community-protocol-issuer
        run: bun install --frozen-lockfile

      - name: Typecheck issuer
        working-directory: services/community-protocol-issuer
        run: bun run check

      - name: Run issuer tests
        working-directory: services/community-protocol-issuer
        run: bun run test

  community-protocol-prover-runpod:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run prover tests
        run: python -m unittest discover -s services/community-protocol-prover-runpod -p 'test_*.py'
