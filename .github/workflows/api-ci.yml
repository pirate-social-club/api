name: api-ci

on:
  pull_request:
    paths:
      - ".github/workflows/api-ci.yml"
      - "db/**"
      - "scripts/**"
      - "services/api/**"
      - "services/cli/**"
      - "services/contracts/**"
  push:
    paths:
      - ".github/workflows/api-ci.yml"
      - "db/**"
      - "scripts/**"
      - "services/api/**"
      - "services/cli/**"
      - "services/contracts/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out CDR SDK
        uses: actions/checkout@v4
        with:
          repository: piplabs/cdr-sdk
          path: cdr-sdk

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            services/contracts/node_modules
            services/api/node_modules
          key: ${{ runner.os }}-bun-1.2.21-api-${{ hashFiles('services/contracts/bun.lock', 'services/api/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.2.21-api-

      - name: Link CDR SDK workspace
        shell: bash
        run: |
          sdk_link_target="${GITHUB_WORKSPACE}/../../cdr-sdk"
          if [ ! -e "${sdk_link_target}" ]; then
            ln -s "${GITHUB_WORKSPACE}/cdr-sdk" "${sdk_link_target}"
          fi

      - name: Install and build CDR SDK
        working-directory: cdr-sdk
        shell: bash
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm --filter @piplabs/cdr-contracts build
          pnpm --filter @piplabs/cdr-crypto build
          pnpm --filter @piplabs/cdr-sdk build

      - name: Install contracts dependencies
        working-directory: services/contracts
        run: bun install --frozen-lockfile

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Typecheck generated contracts package
        working-directory: services/contracts
        run: bun run check

      - name: Install API dependencies
        working-directory: services/api
        run: bun install --frozen-lockfile

      - name: Typecheck API service
        working-directory: services/api
        run: bun run check

      - name: Run API tests
        working-directory: services/api
        run: bun run test

  cli:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            services/contracts/node_modules
            services/cli/node_modules
          key: ${{ runner.os }}-bun-1.2.21-cli-${{ hashFiles('services/contracts/bun.lock', 'services/cli/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.2.21-cli-

      - name: Install contracts dependencies
        working-directory: services/contracts
        run: bun install --frozen-lockfile

      - name: Install CLI dependencies
        working-directory: services/cli
        run: bun install --frozen-lockfile

      - name: Typecheck CLI
        working-directory: services/cli
        run: bun run check

      - name: Run CLI tests
        working-directory: services/cli
        run: bun run test

  bruno:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out CDR SDK
        uses: actions/checkout@v4
        with:
          repository: piplabs/cdr-sdk
          path: cdr-sdk

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.npm
            services/contracts/node_modules
            services/api/node_modules
          key: ${{ runner.os }}-bun-1.2.21-bruno-${{ hashFiles('services/contracts/bun.lock', 'services/api/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.2.21-bruno-

      - name: Link CDR SDK workspace
        shell: bash
        run: |
          sdk_link_target="${GITHUB_WORKSPACE}/../../cdr-sdk"
          if [ ! -e "${sdk_link_target}" ]; then
            ln -s "${GITHUB_WORKSPACE}/cdr-sdk" "${sdk_link_target}"
          fi

      - name: Install and build CDR SDK
        working-directory: cdr-sdk
        shell: bash
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm --filter @piplabs/cdr-contracts build
          pnpm --filter @piplabs/cdr-crypto build
          pnpm --filter @piplabs/cdr-sdk build

      - name: Install sqlite3
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg sqlite3

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Install contracts dependencies
        working-directory: services/contracts
        run: bun install --frozen-lockfile

      - name: Install API dependencies
        working-directory: services/api
        run: bun install --frozen-lockfile

      - name: Write local API env
        working-directory: services/api
        shell: bash
        run: |
          private_key="$(openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 2>/dev/null)"
          public_key="$(printf '%s' "$private_key" | openssl pkey -pubout 2>/dev/null)"
          {
            echo "ENVIRONMENT=development"
            echo "DEV_MEMORY_STORE_ENABLED=false"
            echo "PIRATE_API_PUBLIC_ORIGIN=http://127.0.0.1:8787"
            echo "JWT_BASED_AUTH_ENABLED=true"
            echo "AUTH_UPSTREAM_JWT_SHARED_SECRET=ci-upstream-shared-secret"
            echo "AUTH_UPSTREAM_JWT_ISSUER=pirate-dev-upstream"
            echo "AUTH_UPSTREAM_JWT_AUDIENCE=pirate-api"
            echo "CONTROL_PLANE_DATABASE_URL=file:/tmp/pirate-control-plane.db"
            echo "LOCAL_COMMUNITY_DB_ROOT=/tmp/pirate-community-dbs"
            echo "ALLOW_LOCAL_STUB_REGISTRY_PUBLICATION=true"
            echo "REGISTRY_PUBLISHER_URL="
            echo "REGISTRY_PUBLISHER_AUTH_TOKEN="
            echo "REGISTRY_PUBLISHER_TIMEOUT_MS=25000"
            echo 'PIRATE_APP_JWT_PRIVATE_KEY="'
            printf '%s\n' "$private_key"
            echo '"'
            echo 'PIRATE_APP_JWT_PUBLIC_KEY="'
            printf '%s\n' "$public_key"
            echo '"'
            echo "PIRATE_APP_JWT_ISSUER=pirate-api"
            echo "PIRATE_APP_JWT_AUDIENCE=pirate-app"
            echo "PIRATE_APP_JWT_TTL_SECONDS=3600"
            echo "PRIVY_APP_ID="
            echo "PRIVY_APP_SECRET="
            echo "PRIVY_API_URL="
            echo "PRIVY_JWT_VERIFICATION_KEY="
          } > .env.local-sqlite

      - name: Run Bruno acceptance collection
        working-directory: services/api
        shell: bash
        run: |
          bun run bruno:prepare:local-sqlite
          bun run dev:local-sqlite >/tmp/pirate-api-bruno.log 2>&1 &
          server_pid=$!
          trap 'kill ${server_pid}' EXIT
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8787/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8787/health >/dev/null
          bun run bruno:test:local-sqlite

      - name: Dump local API log on Bruno failure
        if: failure()
        shell: bash
        run: |
          if [ -f /tmp/pirate-api-bruno.log ]; then
            tail -n 200 /tmp/pirate-api-bruno.log
          else
            echo "/tmp/pirate-api-bruno.log not found"
          fi
