name: api-ci

on:
  pull_request:
    paths:
      - ".github/workflows/api-ci.yml"
      - ".github/workflows/staging-contract-gate.yml"
      - ".github/ci-refs/core.sha"
      - ".github/ci-refs/web.sha"
      - "services/api/**"
      - "services/cli/**"
      - "services/community-d1-shard/**"
      - "services/contracts/**"
      - "services/shared/**"
      - "services/song-preview-container/**"
      - "services/story-controlled-inclusion-harness/**"
      - "services/zkpassport-verifier-container/**"
  merge_group:
    types: [checks_requested]
  push:
    branches:
      - main
    paths:
      - ".github/workflows/api-ci.yml"
      - ".github/workflows/staging-contract-gate.yml"
      - ".github/ci-refs/core.sha"
      - ".github/ci-refs/web.sha"
      - "services/api/**"
      - "services/cli/**"
      - "services/community-d1-shard/**"
      - "services/contracts/**"
      - "services/shared/**"
      - "services/song-preview-container/**"
      - "services/story-controlled-inclusion-harness/**"
      - "services/zkpassport-verifier-container/**"
  workflow_dispatch:
    inputs:
      core_sha:
        description: Full Core commit SHA to test instead of the committed CI pin
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: api-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-inputs:
    name: Resolve CI inputs
    runs-on: ubuntu-latest
    outputs:
      core_sha: ${{ steps.core-ref.outputs.sha }}
      web_sha: ${{ steps.web-ref.outputs.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Resolve Core commit
        id: core-ref
        shell: bash
        env:
          REQUESTED_CORE_SHA: ${{ inputs.core_sha }}
        run: |
          pinned_core_sha="$(< .github/ci-refs/core.sha)"
          core_sha="${REQUESTED_CORE_SHA:-$pinned_core_sha}"
          if [[ ! "$core_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Core CI reference must be one full lowercase commit SHA"
            exit 1
          fi
          echo "sha=$core_sha" >> "$GITHUB_OUTPUT"
          {
            echo "## API/Core CI pair"
            echo
            echo "- API: \`${GITHUB_SHA}\`"
            echo "- Core: \`${core_sha}\`"
            if [[ -n "$REQUESTED_CORE_SHA" ]]; then
              echo "- Core source: manual workflow input"
            else
              echo "- Core source: committed .github/ci-refs/core.sha"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve Web commit
        id: web-ref
        shell: bash
        run: |
          pinned_web_sha="$(< .github/ci-refs/web.sha)"
          if [[ ! "$pinned_web_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Web CI reference must be one full lowercase commit SHA"
            exit 1
          fi
          echo "sha=$pinned_web_sha" >> "$GITHUB_OUTPUT"
          {
            echo "- Web: \`${pinned_web_sha}\` (committed .github/ci-refs/web.sha)"
          } >> "$GITHUB_STEP_SUMMARY"

  community-d1-shard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.2.21

      - name: Install shared service dependencies
        working-directory: services/shared
        run: bun install --frozen-lockfile

      - name: Install community D1 shard dependencies
        working-directory: services/community-d1-shard
        run: bun install --frozen-lockfile

      - name: Typecheck community D1 shard
        working-directory: services/community-d1-shard
        run: bun run check

      - name: Test community D1 shard
        working-directory: services/community-d1-shard
        run: bun run test

  story-controlled-inclusion-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.2.21

      - name: Install controlled-inclusion harness dependencies
        working-directory: services/story-controlled-inclusion-harness
        run: bun install --frozen-lockfile

      - name: Typecheck controlled-inclusion harness
        working-directory: services/story-controlled-inclusion-harness
        run: bun run check

      - name: Test controlled-inclusion transaction model
        working-directory: services/story-controlled-inclusion-harness
        run: bun run test

      - name: Test controlled-inclusion Durable Object
        working-directory: services/story-controlled-inclusion-harness
        run: bun run test:workerd

      - name: Validate staging Worker bundle
        working-directory: services/story-controlled-inclusion-harness
        run: bunx wrangler deploy --dry-run --env staging

  bookings-repository:
    # Real-Postgres tests for the global bookings repositories: provisions
    # PostgreSQL 17 and applies the CANONICAL core b0001 before exercising the repository.
    needs: ci-inputs
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Check out core migration source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: pirate-social-club/core
          ref: ${{ needs.ci-inputs.outputs.core_sha }}
          path: core

      - name: Verify Core commit
        working-directory: core
        env:
          EXPECTED_CORE_SHA: ${{ needs.ci-inputs.outputs.core_sha }}
        run: |
          actual_core_sha="$(git rev-parse HEAD)"
          if [[ "$actual_core_sha" != "$EXPECTED_CORE_SHA" ]]; then
            echo "::error::Core checkout mismatch: expected $EXPECTED_CORE_SHA, got $actual_core_sha"
            exit 1
          fi
          echo "Using Core commit $actual_core_sha"

      - name: Check out web repo for cross-repo file deps
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: pirate-social-club/web
          ref: ${{ needs.ci-inputs.outputs.web_sha }}
          path: .cross-repo/web

      - name: Link cross-repo file deps
        run: |
          ln -sfn "$GITHUB_WORKSPACE/core" "$GITHUB_WORKSPACE/../core"
          ln -sfn "$GITHUB_WORKSPACE/.cross-repo/web" "$GITHUB_WORKSPACE/../web"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.2.21

      - name: Install shared dependencies
        working-directory: services/shared
        run: bun install --frozen-lockfile

      - name: Install API dependencies
        id: install-api-dependencies
        working-directory: services/api
        run: bun install --frozen-lockfile

      - name: Run bookings repository real-Postgres tests
        working-directory: services/api
        env:
          PIRATE_CORE_REPO: ${{ github.workspace }}/core
          BOOKINGS_REPO_TEST_ADMIN_URL: "postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable"
          REWARD_CAMPAIGN_PG_CI_REQUIRED: "true"
          REWARD_CAMPAIGN_PG_SENTINEL_PATH: "/tmp/reward-campaign-pg-suite-complete"
        run: |
          echo "::group::host-config repository PG"
          timeout 120s bun test src/lib/bookings/host-config-repository.pg.test.ts
          echo "::endgroup::"
          echo "::group::hold repository PG"
          timeout 120s bun test src/lib/bookings/hold-repository.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking hold service PG"
          timeout 120s bun test src/lib/bookings/booking-hold-service.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking read service PG"
          timeout 120s bun test src/lib/bookings/booking-read-service.pg.test.ts
          echo "::endgroup::"
          echo "::group::payment-intent repository PG"
          timeout 120s bun test src/lib/bookings/payment-intent-repository.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking finalization repository PG"
          timeout 120s bun test src/lib/bookings/booking-finalization-repository.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking lifecycle repository PG"
          timeout 120s bun test src/lib/bookings/booking-lifecycle-repository.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking lifecycle service PG"
          timeout 120s bun test src/lib/bookings/booking-lifecycle-service.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking settlement cron PG"
          timeout 120s bun test src/lib/bookings/booking-settlement-cron.pg.test.ts
          echo "::endgroup::"
          echo "::group::settlement effect repository PG"
          timeout 120s bun test src/lib/bookings/settlement-effect-repository.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking confirm service PG"
          timeout 120s bun test src/lib/bookings/booking-confirm-service.pg.test.ts
          echo "::endgroup::"
          echo "::group::feed booking discovery PG"
          timeout 120s bun test src/lib/feed/home-feed-booking.pg.test.ts
          echo "::endgroup::"
          echo "::group::reward campaign credit PG"
          rm -f "$REWARD_CAMPAIGN_PG_SENTINEL_PATH"
          timeout 120s bun test src/lib/rewards/reward-campaign-reconciler.pg.test.ts
          test "$(cat "$REWARD_CAMPAIGN_PG_SENTINEL_PATH")" = "reward-campaign-postgres-suite-complete"
          echo "::endgroup::"

  api-top-level-tests:
    name: top-level-tests (${{ matrix.shard }}/4)
    needs: ci-inputs
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Check out Core workspace dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: pirate-social-club/core
          ref: ${{ needs.ci-inputs.outputs.core_sha }}
          path: core

      - name: Check out Web workspace dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: pirate-social-club/web
          ref: ${{ needs.ci-inputs.outputs.web_sha }}
          path: .cross-repo/web

      - name: Link workspace dependencies and test fixtures
        run: |
          ln -sfn "$GITHUB_WORKSPACE/core" "$GITHUB_WORKSPACE/../core"
          ln -sfn "$GITHUB_WORKSPACE/.cross-repo/web" "$GITHUB_WORKSPACE/../web"
          ln -sfn "$GITHUB_WORKSPACE/services/api/test-fixtures/db" "$GITHUB_WORKSPACE/../db"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.10

      - name: Install shared dependencies
        working-directory: services/shared
        run: bun install --frozen-lockfile

      - name: Install API dependencies
        working-directory: services/api
        run: bun install --frozen-lockfile

      - name: Generate karaoke runtime build provenance
        working-directory: .cross-repo/web/packages/karaoke-runtime
        run: bun run build:provenance

      - name: Run top-level API tests
        shell: bash
        working-directory: services/api
        env:
          PIRATE_CORE_REPO: ${{ github.workspace }}/core
          TEST_SHARD: ${{ matrix.shard }}
          TEST_SHARD_COUNT: 4
        run: |
          set -euo pipefail
          mapfile -t test_files < <(find tests -maxdepth 1 -type f -name '*.test.ts' -print | sort)
          selected=()
          for index in "${!test_files[@]}"; do
            if (( index % TEST_SHARD_COUNT == TEST_SHARD - 1 )); then
              selected+=("${test_files[$index]}")
            fi
          done
          if (( ${#selected[@]} == 0 )); then
            echo "::error::No top-level API tests selected for shard ${TEST_SHARD}/${TEST_SHARD_COUNT}"
            exit 1
          fi
          echo "Shard ${TEST_SHARD}/${TEST_SHARD_COUNT}: ${#selected[@]} files"
          bun run scripts/run-route-tests.ts "${selected[@]}"

  api-core:
    name: api-core
    needs: ci-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # For the bookings production-path test (withRequestControlPlaneClients -> getControlPlaneClient ->
      # real PostgresClientAdapter/PostgresTransactionAdapter), which runs in this full-install job.
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Start iron-proxy egress audit
        uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a
        with:
          version: 0.49.0
          egress-rules: egress-rules.yaml
          warn: true

      - name: Link shared database fixtures
        run: |
          ln -sfn "$GITHUB_WORKSPACE/services/api/test-fixtures/db" "$GITHUB_WORKSPACE/../db"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.10

      - name: Run repo hygiene checks
        run: node scripts/check-repo-hygiene.mjs

      - name: Install shared dependencies
        working-directory: services/shared
        run: bun install --frozen-lockfile

      - name: Audit shared dependencies
        working-directory: services/shared
        run: bun audit --audit-level=high

      - name: Typecheck shared package
        working-directory: services/shared
        run: bun run check

      - name: Install contracts dependencies
        working-directory: services/contracts
        run: bun install --frozen-lockfile

      - name: Audit contracts dependencies
        working-directory: services/contracts
        run: bun audit --audit-level=high

      - name: Typecheck generated contracts package
        working-directory: services/contracts
        run: bun run check

      - name: Check out core migration source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: pirate-social-club/core
          ref: ${{ needs.ci-inputs.outputs.core_sha }}
          path: core

      - name: Verify Core commit
        working-directory: core
        env:
          EXPECTED_CORE_SHA: ${{ needs.ci-inputs.outputs.core_sha }}
        run: |
          actual_core_sha="$(git rev-parse HEAD)"
          if [[ "$actual_core_sha" != "$EXPECTED_CORE_SHA" ]]; then
            echo "::error::Core checkout mismatch: expected $EXPECTED_CORE_SHA, got $actual_core_sha"
            exit 1
          fi
          echo "Using Core commit $actual_core_sha"

      - name: Check generated contracts freshness against core spec
        working-directory: services/contracts
        env:
          # Core is checked out at $GITHUB_WORKSPACE/core above. Point the
          # generator at it explicitly. No conditional skip: if core is
          # unavailable, resolveCoreRepoRoot throws and this step fails loudly,
          # rather than silently passing a stale contract (the previous guard
          # tested ../../../specs — a path that never existed and always skipped).
          PIRATE_CORE_REPO: ${{ github.workspace }}/core
        run: bun run check:fresh

      - name: Check community schema guards
        working-directory: services/api
        run: bun run check:community-schema-guards

      - name: Check community schema snapshot freshness
        working-directory: services/api
        env:
          # Regenerate the provisioning snapshot from the core community-template
          # migrations and fail if the committed snapshot drifts (or if any core
          # migration is missing from the recorded ledger). Prevents a stale
          # generated snapshot from provisioning communities with the wrong schema.
          PIRATE_CORE_REPO: ${{ github.workspace }}/core
        run: bun run check:community-schema-snapshot

      - name: Check control-plane migration fixture freshness
        working-directory: services/api
        env:
          PIRATE_CORE_REPO: ${{ github.workspace }}/core
        run: bun run check:control-plane-fixtures

      - name: Install ZKPassport verifier container dependencies
        working-directory: services/zkpassport-verifier-container
        run: bun install --frozen-lockfile

      - name: Audit ZKPassport verifier container dependencies
        working-directory: services/zkpassport-verifier-container
        # Temporary tooling-only exception. Miniflare pins sharp 0.34.5, while
        # the verifier image installs its dedicated production runtime only.
        # Expires 2026-08-05; remove via #699.
        run: bun audit --audit-level=high --ignore GHSA-f88m-g3jw-g9cj

      - name: Typecheck ZKPassport verifier container
        working-directory: services/zkpassport-verifier-container
        run: bun run check

      - name: Test ZKPassport verifier container
        working-directory: services/zkpassport-verifier-container
        run: bun run test

      - name: Install ZKPassport verifier runtime dependencies
        working-directory: services/zkpassport-verifier-runtime
        run: bun install --frozen-lockfile --production

      - name: Audit ZKPassport verifier runtime dependencies
        working-directory: services/zkpassport-verifier-runtime
        run: bun audit --audit-level=high

      - name: Check out web repo for cross-repo file deps
        # services/api depends on @pirate-social-club/karaoke-runtime via
        # file:../../../web/packages/karaoke-runtime — CI must mirror the
        # workspace layout (web as a sibling) so the file: path resolves.
        #
        # PINNED to a SHA, not a mutable branch, so web drift cannot cause a
        # time-dependent failure with no change in this repo.
        #
        # The SHA lives in .github/ci-refs/web.sha (single source of truth, mirroring
        # core.sha) and is resolved once by the ci-inputs job. Bump it there.
        #
        # The api karaoke tests REQUIRE a web ref carrying the `initialSequence` field on
        # KaraokeStreamingSttAdapter.start(). Against the previous pin (ecda035d) they fail:
        #   - "restores JSON, binary, STT, and server-output sequence counters after eviction"
        #   - "resumes STT scoring after a fresh DO restores the session"
        # Note `tsc` stays CLEAN against the old pin (TypeScript method parameter
        # bivariance hides the missing field), so the runtime tests are the only guard.
        #
        # The previous pin's stated blocker is resolved: cd4b93fb's required
        # `uncertainLineCount` on KaraokeSessionSummary no longer breaks this repo — the api
        # suite and `tsc` both pass against web main.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: pirate-social-club/web
          ref: ${{ needs.ci-inputs.outputs.web_sha }}
          path: .cross-repo/web

      - name: Link web repo for cross-repo file deps
        run: |
          ln -sfn "$GITHUB_WORKSPACE/.cross-repo/web" "$GITHUB_WORKSPACE/../web"
          # @pirate/bookings-domain lives at file:../../../core/packages/bookings-domain; the
          # core repo is checked out at $GITHUB_WORKSPACE/core, so link it as a sibling too.
          ln -sfn "$GITHUB_WORKSPACE/core" "$GITHUB_WORKSPACE/../core"

      - name: Install song preview container dependencies
        working-directory: services/song-preview-container
        run: bun install --frozen-lockfile

      - name: Audit song preview container dependencies
        working-directory: services/song-preview-container
        # Wrangler/Miniflare development-tool exception. Expires 2026-08-05;
        # remove via #699 once Miniflare consumes sharp >=0.35.0.
        run: bun audit --audit-level=high --ignore GHSA-f88m-g3jw-g9cj

      - name: Typecheck song preview container
        working-directory: services/song-preview-container
        run: bun run check

      - name: Test song preview container
        working-directory: services/song-preview-container
        run: bun run test

      - name: Install API dependencies
        working-directory: services/api
        run: bun install --frozen-lockfile

      - name: Audit API dependencies
        working-directory: services/api
        # Wrangler/Vitest Miniflare development-tool exception. The deployed
        # Worker bundle does not ship this Node dependency tree. Expires
        # 2026-08-05; remove via #699.
        run: bun audit --audit-level=high --ignore GHSA-f88m-g3jw-g9cj

      - name: Typecheck API service
        working-directory: services/api
        run: bun run check

      - name: Lint API service
        working-directory: services/api
        run: bun run lint

      - name: Run API unit tests
        working-directory: services/api
        run: bun run test:unit

      - name: Run bookings production-path real-Postgres test
        # Runs after install/core-checkout even if an earlier step (e.g. the pre-existing, unrelated
        # fetch-types typecheck drift) failed, so this bookings coverage is observed on its own merits.
        if: always() && steps.install-api-dependencies.outcome == 'success'
        working-directory: services/api
        env:
          PIRATE_CORE_REPO: ${{ github.workspace }}/core
          BOOKINGS_REPO_TEST_ADMIN_URL: "postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable"
        run: bun test src/lib/bookings/host-config-repository.production-path.pg.test.ts

      - name: Run API coverage report
        # Report-only: this command enforces no threshold, and coverage instrumentation can be flaky/OOM-prone.
        continue-on-error: true
        timeout-minutes: 10
        working-directory: services/api
        run: bun run coverage

      - name: Show iron-proxy egress summary
        uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a
        if: always()

  api-route-tests:
    name: route-tests (${{ matrix.shard }}/8)
    needs: ci-inputs
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Start iron-proxy egress audit
        uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a
        with:
          version: 0.49.0
          egress-rules: egress-rules.yaml
          warn: true

      - name: Check out Core workspace dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: pirate-social-club/core
          ref: ${{ needs.ci-inputs.outputs.core_sha }}
          path: core

      - name: Check out Web workspace dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: pirate-social-club/web
          ref: ${{ needs.ci-inputs.outputs.web_sha }}
          path: .cross-repo/web

      - name: Link workspace dependencies and test fixtures
        run: |
          ln -sfn "$GITHUB_WORKSPACE/core" "$GITHUB_WORKSPACE/../core"
          ln -sfn "$GITHUB_WORKSPACE/.cross-repo/web" "$GITHUB_WORKSPACE/../web"
          ln -sfn "$GITHUB_WORKSPACE/services/api/test-fixtures/db" "$GITHUB_WORKSPACE/../db"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.10

      - name: Install shared dependencies
        working-directory: services/shared
        run: bun install --frozen-lockfile

      - name: Install API dependencies
        working-directory: services/api
        run: bun install --frozen-lockfile

      - name: Generate karaoke runtime build provenance
        working-directory: .cross-repo/web/packages/karaoke-runtime
        run: bun run build:provenance

      - name: Run route-test shard
        working-directory: services/api
        env:
          ROUTE_TEST_SHARD: ${{ matrix.shard }}
          ROUTE_TEST_SHARD_COUNT: 8
        run: bun run test:routes

      - name: Show iron-proxy egress summary
        uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a
        if: always()

  api:
    name: api
    if: always()
    needs:
      - api-core
      - api-route-tests
      - story-controlled-inclusion-harness
    runs-on: ubuntu-latest
    steps:
      - name: Verify API checks
        env:
          API_CORE_RESULT: ${{ needs.api-core.result }}
          API_ROUTE_TESTS_RESULT: ${{ needs.api-route-tests.result }}
          STORY_CONTROLLED_INCLUSION_HARNESS_RESULT: ${{ needs.story-controlled-inclusion-harness.result }}
        run: |
          test "$API_CORE_RESULT" = "success"
          test "$API_ROUTE_TESTS_RESULT" = "success"
          test "$STORY_CONTROLLED_INCLUSION_HARNESS_RESULT" = "success"

  cli:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Start iron-proxy egress audit
        uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a
        with:
          version: 0.49.0
          egress-rules: egress-rules.yaml
          warn: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.2.21

      - name: Install contracts dependencies
        working-directory: services/contracts
        run: bun install --frozen-lockfile

      - name: Audit contracts dependencies
        working-directory: services/contracts
        run: bun audit --audit-level=high

      - name: Install CLI dependencies
        working-directory: services/cli
        run: bun install --frozen-lockfile

      - name: Audit CLI dependencies
        working-directory: services/cli
        run: bun audit --audit-level=high

      - name: Typecheck CLI
        working-directory: services/cli
        run: bun run check

      - name: Run CLI tests
        working-directory: services/cli
        run: bun run test

      - name: Show iron-proxy egress summary
        uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a
        if: always()
