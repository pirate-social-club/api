name: api-ci

on:
  pull_request:
    paths:
      - ".github/workflows/api-ci.yml"
      - "services/api/**"
      - "services/cli/**"
      - "services/community-protocol-prover-runpod/**"
      - "services/contracts/**"
      - "services/shared/**"
      - "services/song-preview-container/**"
      - "services/zkpassport-verifier-container/**"
  push:
    paths:
      - ".github/workflows/api-ci.yml"
      - "services/api/**"
      - "services/cli/**"
      - "services/community-protocol-prover-runpod/**"
      - "services/contracts/**"
      - "services/shared/**"
      - "services/song-preview-container/**"
      - "services/zkpassport-verifier-container/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bookings-repository:
    # Real-Postgres tests for the global bookings repositories: provisions
    # PostgreSQL 17 and applies the CANONICAL core b0001 before exercising the repository.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out core migration source
        uses: actions/checkout@v4
        with:
          repository: pirate-social-club/core
          path: core

      - name: Check out web repo for cross-repo file deps
        uses: actions/checkout@v4
        with:
          repository: pirate-social-club/web
          ref: ecda035d00d1b134ad9ca129ba6db16a0ac9da22
          path: .cross-repo/web

      - name: Link cross-repo file deps
        run: |
          ln -sfn "$GITHUB_WORKSPACE/core" "$GITHUB_WORKSPACE/../core"
          ln -sfn "$GITHUB_WORKSPACE/.cross-repo/web" "$GITHUB_WORKSPACE/../web"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install API dependencies
        working-directory: services/api
        run: bun install --frozen-lockfile

      - name: Run bookings repository real-Postgres tests
        working-directory: services/api
        env:
          PIRATE_CORE_REPO: ${{ github.workspace }}/core
          BOOKINGS_REPO_TEST_ADMIN_URL: "postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable"
        run: |
          echo "::group::host-config repository PG"
          timeout 120s bun test src/lib/bookings/host-config-repository.pg.test.ts
          echo "::endgroup::"
          echo "::group::hold repository PG"
          timeout 120s bun test src/lib/bookings/hold-repository.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking hold service PG"
          timeout 120s bun test src/lib/bookings/booking-hold-service.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking read service PG"
          timeout 120s bun test src/lib/bookings/booking-read-service.pg.test.ts
          echo "::endgroup::"
          echo "::group::payment-intent repository PG"
          timeout 120s bun test src/lib/bookings/payment-intent-repository.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking finalization repository PG"
          timeout 120s bun test src/lib/bookings/booking-finalization-repository.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking lifecycle repository PG"
          timeout 120s bun test src/lib/bookings/booking-lifecycle-repository.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking lifecycle service PG"
          timeout 120s bun test src/lib/bookings/booking-lifecycle-service.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking settlement cron PG"
          timeout 120s bun test src/lib/bookings/booking-settlement-cron.pg.test.ts
          echo "::endgroup::"
          echo "::group::settlement effect repository PG"
          timeout 120s bun test src/lib/bookings/settlement-effect-repository.pg.test.ts
          echo "::endgroup::"
          echo "::group::booking confirm service PG"
          timeout 120s bun test src/lib/bookings/booking-confirm-service.pg.test.ts
          echo "::endgroup::"

  api:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # For the bookings production-path test (withRequestControlPlaneClients -> getControlPlaneClient ->
      # real PostgresClientAdapter/PostgresTransactionAdapter), which runs in this full-install job.
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start iron-proxy egress audit
        uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a
        with:
          version: 0.41.0
          egress-rules: egress-rules.yaml
          warn: true

      - name: Link shared database fixtures
        run: |
          ln -sfn "$GITHUB_WORKSPACE/services/api/test-fixtures/db" "$GITHUB_WORKSPACE/../db"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Run repo hygiene checks
        run: node scripts/check-repo-hygiene.mjs

      - name: Install shared dependencies
        working-directory: services/shared
        run: bun install --frozen-lockfile

      - name: Audit shared dependencies
        working-directory: services/shared
        run: bun audit --audit-level=high

      - name: Typecheck shared package
        working-directory: services/shared
        run: bun run check

      - name: Install contracts dependencies
        working-directory: services/contracts
        run: bun install --frozen-lockfile

      - name: Audit contracts dependencies
        working-directory: services/contracts
        run: bun audit --audit-level=high

      - name: Typecheck generated contracts package
        working-directory: services/contracts
        run: bun run check

      - name: Check out core migration source
        uses: actions/checkout@v4
        with:
          repository: pirate-social-club/core
          path: core

      - name: Select matching core branch when available
        working-directory: core
        run: |
          core_ref="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if [ -n "$core_ref" ] && git ls-remote --exit-code origin "refs/heads/${core_ref}" >/dev/null 2>&1; then
            git fetch --depth=1 origin "refs/heads/${core_ref}:refs/remotes/origin/${core_ref}"
            git checkout --detach "refs/remotes/origin/${core_ref}"
            echo "Using core branch ${core_ref} for cross-repo checks."
          else
            echo "Using default core branch for cross-repo checks."
          fi

      - name: Check generated contracts freshness against core spec
        working-directory: services/contracts
        env:
          # Core is checked out at $GITHUB_WORKSPACE/core above. Point the
          # generator at it explicitly. No conditional skip: if core is
          # unavailable, resolveCoreRepoRoot throws and this step fails loudly,
          # rather than silently passing a stale contract (the previous guard
          # tested ../../../specs — a path that never existed and always skipped).
          PIRATE_CORE_REPO: ${{ github.workspace }}/core
        run: bun run check:fresh

      - name: Check community schema guards
        working-directory: services/api
        run: bun run check:community-schema-guards

      - name: Check community schema snapshot freshness
        working-directory: services/api
        env:
          # Regenerate the provisioning snapshot from the core community-template
          # migrations and fail if the committed snapshot drifts (or if any core
          # migration is missing from the recorded ledger). Prevents a stale
          # generated snapshot from provisioning communities with the wrong schema.
          PIRATE_CORE_REPO: ${{ github.workspace }}/core
        run: bun run check:community-schema-snapshot

      - name: Install ZKPassport verifier container dependencies
        working-directory: services/zkpassport-verifier-container
        run: bun install --frozen-lockfile

      - name: Audit ZKPassport verifier container dependencies
        working-directory: services/zkpassport-verifier-container
        run: bun audit --audit-level=high

      - name: Typecheck ZKPassport verifier container
        working-directory: services/zkpassport-verifier-container
        run: bun run check

      - name: Test ZKPassport verifier container
        working-directory: services/zkpassport-verifier-container
        run: bun run test

      - name: Check out web repo for cross-repo file deps
        # services/api depends on @pirate-social-club/karaoke-runtime via
        # file:../../../web/packages/karaoke-runtime — CI must mirror the
        # workspace layout (web as a sibling) so the file: path resolves.
        #
        # PINNED to a SHA, not the mutable `release/karaoke-web` branch. That branch drifts
        # independently of this repo: commit cd4b93fb added a required `uncertainLineCount` field to
        # KaraokeSessionSummary, which breaks `tsgo` against the (un-updated) api karaoke test in
        # tests/lib/karaoke/session-do.test.ts — a time-dependent failure with no change in this repo.
        # de5eafa2 is the last commit on release/karaoke-web before cd4b93fb (last type-compatible
        # with the current api karaoke test).
        # UPDATE PROCEDURE: when the api karaoke test is updated to the newer karaoke-runtime type
        # (uncertainLineCount), bump this SHA to the matching release/karaoke-web commit, ideally
        # landing both changes together.
        uses: actions/checkout@v4
        with:
          repository: pirate-social-club/web
          ref: ecda035d00d1b134ad9ca129ba6db16a0ac9da22
          path: .cross-repo/web

      - name: Link web repo for cross-repo file deps
        run: |
          ln -sfn "$GITHUB_WORKSPACE/.cross-repo/web" "$GITHUB_WORKSPACE/../web"
          # @pirate/bookings-domain lives at file:../../../core/packages/bookings-domain; the
          # core repo is checked out at $GITHUB_WORKSPACE/core, so link it as a sibling too.
          ln -sfn "$GITHUB_WORKSPACE/core" "$GITHUB_WORKSPACE/../core"

      - name: Install song preview container dependencies
        working-directory: services/song-preview-container
        run: bun install --frozen-lockfile

      - name: Audit song preview container dependencies
        working-directory: services/song-preview-container
        run: bun audit --audit-level=high

      - name: Typecheck song preview container
        working-directory: services/song-preview-container
        run: bun run check

      - name: Test song preview container
        working-directory: services/song-preview-container
        run: bun run test

      - name: Install API dependencies
        working-directory: services/api
        run: bun install --frozen-lockfile

      - name: Audit API dependencies
        working-directory: services/api
        run: bun audit --audit-level=high

      - name: Typecheck API service
        working-directory: services/api
        run: bun run check

      - name: Lint API service
        working-directory: services/api
        run: bun run lint

      - name: Run API unit tests
        working-directory: services/api
        run: bun run test:unit

      - name: Run API route tests
        working-directory: services/api
        run: bun run test:routes

      - name: Run bookings production-path real-Postgres test
        # Runs after install/core-checkout even if an earlier step (e.g. the pre-existing, unrelated
        # fetch-types typecheck drift) failed, so this bookings coverage is observed on its own merits.
        if: success() || failure()
        working-directory: services/api
        env:
          PIRATE_CORE_REPO: ${{ github.workspace }}/core
          BOOKINGS_REPO_TEST_ADMIN_URL: "postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable"
        run: bun test src/lib/bookings/host-config-repository.production-path.pg.test.ts

      - name: Run API coverage report
        working-directory: services/api
        run: bun run coverage

      - name: Show iron-proxy egress summary
        uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a
        if: always()

  cli:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start iron-proxy egress audit
        uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a
        with:
          version: 0.41.0
          egress-rules: egress-rules.yaml
          warn: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install contracts dependencies
        working-directory: services/contracts
        run: bun install --frozen-lockfile

      - name: Audit contracts dependencies
        working-directory: services/contracts
        run: bun audit --audit-level=high

      - name: Install CLI dependencies
        working-directory: services/cli
        run: bun install --frozen-lockfile

      - name: Audit CLI dependencies
        working-directory: services/cli
        run: bun audit --audit-level=high

      - name: Typecheck CLI
        working-directory: services/cli
        run: bun run check

      - name: Run CLI tests
        working-directory: services/cli
        run: bun run test

      - name: Show iron-proxy egress summary
        uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a
        if: always()

  community-protocol-prover-runpod:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start iron-proxy egress audit
        uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a
        with:
          version: 0.41.0
          egress-rules: egress-rules.yaml
          warn: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run prover tests
        run: python -m unittest discover -s services/community-protocol-prover-runpod -p 'test_*.py'

      - name: Show iron-proxy egress summary
        uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a
        if: always()
