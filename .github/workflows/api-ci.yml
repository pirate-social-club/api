name: api-ci

on:
  pull_request:
    paths:
      - ".github/workflows/api-ci.yml"
      - "services/api/**"
      - "services/cli/**"
      - "services/contracts/**"
  push:
    paths:
      - ".github/workflows/api-ci.yml"
      - "services/api/**"
      - "services/cli/**"
      - "services/contracts/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out shared workspace fixtures
        uses: actions/checkout@v4
        with:
          repository: pirate-social-club/core
          path: core-shared
          sparse-checkout: |
            db
            specs
          sparse-checkout-cone-mode: false

      - name: Link shared workspace fixtures
        run: |
          ln -sfn "$GITHUB_WORKSPACE/core-shared/db" "$GITHUB_WORKSPACE/../db"
          ln -sfn "$GITHUB_WORKSPACE/core-shared/specs" "$GITHUB_WORKSPACE/../specs"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install contracts dependencies
        working-directory: services/contracts
        run: bun install --frozen-lockfile

      - name: Check generated contracts freshness when specs are available
        working-directory: services/contracts
        run: |
          if [ -f ../../../specs/api/scripts/generate-api-contracts.ts ]; then
            bun run check:fresh
          else
            echo "Skipping contracts freshness check; sibling specs checkout not available."
          fi

      - name: Typecheck generated contracts package
        working-directory: services/contracts
        run: bun run check

      - name: Install API dependencies
        working-directory: services/api
        run: bun install --frozen-lockfile

      - name: Typecheck API service
        working-directory: services/api
        run: bun run check

      - name: Run API tests
        working-directory: services/api
        run: bun run test

  cli:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install contracts dependencies
        working-directory: services/contracts
        run: bun install --frozen-lockfile

      - name: Install CLI dependencies
        working-directory: services/cli
        run: bun install --frozen-lockfile

      - name: Typecheck CLI
        working-directory: services/cli
        run: bun run check

      - name: Run CLI tests
        working-directory: services/cli
        run: bun run test
